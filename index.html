<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>సుడోకు — సన్నివేశం</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Safe container alignment layout rule definitions */
    .game-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
      margin-top: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(201, 162, 75, 0.2);
    }
    .game-title-section h2 {
      color: var(--gold);
      font-size: 1.8rem;
      margin: 0;
      font-family: 'Cinzel', serif;
    }
    .game-title-section p {
      margin: 5px 0 0 0;
      color: var(--parchment-dim);
    }
    .back-link {
      color: #4CB5C9;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.2s;
      padding-bottom: 4px;
    }
    .back-link:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="home-bg"></div>

  <!-- Standard Main Website Centered Container Frame Wrapper Layout -->
  <div class="main-container" style="max-width: 900px; margin: 0 auto; padding: 20px; box-sizing: border-box;">
    
    <div class="top-brand" style="text-align: center; margin-bottom: 40px;">
      <img src="https://sannivesham.com/images/logo.png" class="logo-image" alt="Sannivesham Logo">
      <div class="brand-text">
        <h1>సన్నివేశం</h1>
        <p>సంస్కృతి • సంప్రదాయం • సంభాషణ</p>
      </div>
    </div>

    <div class="game-meta-row">
      <div class="game-title-section">
        <h2>SANNIVESHAM SUDOKU</h2>
        <p>Solve the grid. Uncover the epics.</p>
      </div>
      <a href="https://sannivesham.com" class="back-link">← Back to main site</a>
    </div>

    <!-- Active Target Node Vector Array Grid Block Structure Mapping Element -->
    <div id="levelGrid" class="level-grid" style="margin-top: 30px;"></div>

  </div>

  <script type="module" src="progress.js"></script>
  <script type="module" src="level-select.js"></script>

</body>
</html>
