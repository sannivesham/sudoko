<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>సుడోకు — సంస్కృతి • సంప్రదాయం • సంభాషణ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .game-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
      max-width: 900px;
      margin: 0 auto 20px auto;
      padding: 0 20px 15px 20px;
      box-sizing: border-box;
      border-bottom: 1px solid rgba(201, 162, 75, 0.2);
    }

    .game-title-section h2 {
      color: var(--gold);
      font-size: 1.8rem;
      margin: 0;
      font-family: 'Cinzel', serif;
    }

    .game-title-section p {
      margin: 5px 0 0 0;
      color: var(--parchment-dim);
    }

    .back-link {
      color: #4CB5C9;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.2s;
      padding-bottom: 4px;
    }

    .back-link:hover {
      color: var(--gold);
    }

    .grid-container-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 40px 20px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="home-bg"></div>

  <!-- Reverting exactly to your platform's native brand header structure -->
  <div class="top-brand">
    <img src="https://sannivesham.com/images/logo.png" alt="Sannivesham Logo" class="logo-image">
    <div class="brand-text">
      <h1>సన్నివేశం</h1>
      <p>సంస్కృతి • సంప్రదాయం • సంభాషణ</p>
    </div>
  </div>

  <!-- Game Details and Navigation Row -->
  <div class="game-meta-row">
    <div class="game-title-section">
      <h2>SANNIVESHAM SUDOKU</h2>
      <p>Solve the grid. Uncover the epics.</p>
    </div>
    <a href="https://sannivesham.com" class="back-link">← Back to main site</a>
  </div>

  <!-- Level Grid Wrapper Box -->
  <div class="grid-container-wrapper">
    <div id="levelGrid" class="level-grid"></div>
  </div>

  <script type="module" src="progress.js"></script>
  <script type="module" src="level-select.js"></script>

</body>
</html>
