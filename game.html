<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythology Sudoku — Play</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <div>
        <h1 id="levelTitle">Level</h1>
        <p class="subtitle" id="levelSubtitle"></p>
      </div>
      <a class="back-link" href="index.html">&larr; All levels</a>
    </header>

    <div class="game-header">
      <div class="game-stats">
        <span>Time <strong id="timer">00:00</strong></span>
        <span>Mistakes <strong id="mistakeCount">0</strong></span>
      </div>
      <div class="controls-row" style="margin:0;">
        <button class="btn btn-secondary" id="hintBtn">Hint</button>
        <button class="btn btn-secondary" id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="board-frame">
      <div class="sudoku-grid" id="grid"></div>
    </div>

    <div class="symbol-palette" id="palette"></div>
  </div>

  <div class="overlay hidden" id="winOverlay">
    <div class="overlay-card">
      <h2>Puzzle Solved</h2>
      <div class="overlay-stars" id="winStars">★★★</div>
      <p id="winTime"></p>
      <div class="controls-row">
        <a class="btn btn-primary" href="index.html">All levels</a>
        <button class="btn btn-secondary" id="nextLevelBtn">Next level</button>
      </div>
    </div>
  </div>

  <script src="js/symbols.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
